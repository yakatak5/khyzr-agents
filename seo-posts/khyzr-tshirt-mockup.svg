<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800" height="900" viewBox="0 0 800 900">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    <!-- Shirt body shadow/depth -->
    <linearGradient id="shirtShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.35"/>
      <stop offset="20%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="80%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.35"/>
    </linearGradient>
    <!-- Shirt highlight -->
    <linearGradient id="shirtHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.02"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08"/>
    </linearGradient>
    <!-- Fold shadow filter -->
    <filter id="fabricShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="logoPrint" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="url(#bgGrad)"/>

  <!-- Subtle surface texture dots -->
  <g opacity="0.03">
    <circle cx="100" cy="100" r="1" fill="white"/>
    <circle cx="200" cy="150" r="1" fill="white"/>
    <circle cx="600" cy="80" r="1" fill="white"/>
    <circle cx="700" cy="200" r="1" fill="white"/>
    <circle cx="150" cy="750" r="1" fill="white"/>
    <circle cx="650" cy="800" r="1" fill="white"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- T-SHIRT SHAPE                           -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#fabricShadow)">

    <!-- Main shirt body — flat black -->
    <path d="
      M 200 180
      L 100 120
      L  60 260
      L 160 280
      L 155 760
      L 645 760
      L 640 280
      L 740 260
      L 700 120
      L 600 180
      Q 560 130 530 115
      Q 500  85 460  72
      Q 430  62 400  60
      Q 370  62 340  72
      Q 300  85 270 115
      Q 240 130 200 180
      Z
    " fill="#111111"/>

    <!-- Sleeve left — slightly lighter to show fold -->
    <path d="
      M 200 180
      L 100 120
      L  60 260
      L 160 280
      L 165 230
      Q 175 195 200 180
      Z
    " fill="#151515"/>

    <!-- Sleeve right -->
    <path d="
      M 600 180
      L 700 120
      L 740 260
      L 640 280
      L 635 230
      Q 625 195 600 180
      Z
    " fill="#151515"/>

    <!-- Fabric highlight overlay -->
    <path d="
      M 200 180
      L 100 120
      L  60 260
      L 160 280
      L 155 760
      L 645 760
      L 640 280
      L 740 260
      L 700 120
      L 600 180
      Q 560 130 530 115
      Q 500  85 460  72
      Q 430  62 400  60
      Q 370  62 340  72
      Q 300  85 270 115
      Q 240 130 200 180
      Z
    " fill="url(#shirtHighlight)"/>

    <!-- Side shadow overlay -->
    <path d="
      M 200 180
      L 100 120
      L  60 260
      L 160 280
      L 155 760
      L 645 760
      L 640 280
      L 740 260
      L 700 120
      L 600 180
      Q 560 130 530 115
      Q 500  85 460  72
      Q 430  62 400  60
      Q 370  62 340  72
      Q 300  85 270 115
      Q 240 130 200 180
      Z
    " fill="url(#shirtShadow)"/>

    <!-- Collar — crew neck -->
    <path d="
      M 270 115
      Q 300  85 340  72
      Q 370  62 400  60
      Q 430  62 460  72
      Q 500  85 530 115
      Q 500 155 460 165
      Q 430 172 400 173
      Q 370 172 340 165
      Q 300 155 270 115
      Z
    " fill="#0e0e0e" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Collar inner highlight -->
    <path d="
      M 285 118
      Q 315  92 350  80
      Q 375  73 400  72
      Q 425  73 450  80
      Q 485  92 515 118
      Q 490 148 455 157
      Q 428 163 400 164
      Q 372 163 345 157
      Q 310 148 285 118
      Z
    " fill="none" stroke="#222222" stroke-width="1.5"/>

    <!-- Subtle chest fold line -->
    <path d="M 400 200 Q 400 420 410 620" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>

    <!-- Subtle wrinkle lines -->
    <path d="M 165 330 Q 210 340 250 335" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.6"/>
    <path d="M 635 330 Q 590 340 550 335" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.6"/>
    <path d="M 180 500 Q 220 508 260 504" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.4"/>
    <path d="M 620 500 Q 580 508 540 504" fill="none" stroke="#0a0a0a" stroke-width="1" opacity="0.4"/>

  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- LOGO PRINT — chest center              -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#logoPrint)">

    <!-- Logo mark — the "k" — scaled up from 48px favicon -->
    <!-- Recreated as clean vector from the favicon pixel analysis -->
    <!-- Dark green #006400 lettermark, bold sans-serif "k" -->
    <text x="400" y="400"
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="96"
      font-weight="800"
      fill="#006400"
      text-anchor="middle"
      dominant-baseline="central"
      letter-spacing="-2">k</text>

    <!-- "KHYZR" wordmark below the k -->
    <text x="400" y="468"
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="18"
      font-weight="700"
      fill="#006400"
      text-anchor="middle"
      letter-spacing="6"
      opacity="0.9">KHYZR</text>

    <!-- Thin separator line -->
    <line x1="355" y1="478" x2="445" y2="478" stroke="#006400" stroke-width="0.8" opacity="0.5"/>

    <!-- Tagline -->
    <text x="400" y="496"
      font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
      font-size="9"
      font-weight="400"
      fill="#006400"
      text-anchor="middle"
      letter-spacing="2"
      opacity="0.7">STRIVE FORWARD</text>

  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- PRESENTATION LABEL                     -->
  <!-- ═══════════════════════════════════════ -->
  <text x="400" y="840"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#444444"
    text-anchor="middle"
    letter-spacing="2">KHYZR — CONCEPT MOCKUP</text>

</svg>