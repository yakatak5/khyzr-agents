<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="50%" style="stop-color:#0f1b35"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e8c96d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f6ef7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Network nodes — right side -->
  <!-- Node connections first (behind nodes) -->
  <g opacity="0.25" stroke="#e8c96d" stroke-width="1" fill="none">
    <line x1="820" y1="180" x2="960" y2="130"/>
    <line x1="820" y1="180" x2="1050" y2="280"/>
    <line x1="820" y1="180" x2="750" y2="310"/>
    <line x1="960" y1="130" x2="1080" y2="160"/>
    <line x1="960" y1="130" x2="1050" y2="280"/>
    <line x1="1050" y1="280" x2="1080" y2="160"/>
    <line x1="1050" y1="280" x2="980" y2="400"/>
    <line x1="750" y1="310" x2="820" y2="420"/>
    <line x1="750" y1="310" x2="980" y2="400"/>
    <line x1="820" y1="420" x2="980" y2="400"/>
    <line x1="820" y1="420" x2="720" y2="480"/>
    <line x1="1080" y1="160" x2="1130" y2="300"/>
    <line x1="1130" y1="300" x2="980" y2="400"/>
  </g>

  <!-- Glowing connection lines -->
  <g filter="url(#glow)" opacity="0.5" stroke="#4f6ef7" stroke-width="1.5" fill="none">
    <line x1="820" y1="180" x2="960" y2="130"/>
    <line x1="960" y1="130" x2="1050" y2="280"/>
    <line x1="750" y1="310" x2="980" y2="400"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="820" cy="180" r="8" fill="#e8c96d" opacity="0.9"/>
    <circle cx="820" cy="180" r="14" fill="none" stroke="#e8c96d" stroke-width="1" opacity="0.3"/>
    <circle cx="960" cy="130" r="5" fill="#4f6ef7" opacity="0.9"/>
    <circle cx="960" cy="130" r="10" fill="none" stroke="#4f6ef7" stroke-width="1" opacity="0.3"/>
    <circle cx="1050" cy="280" r="6" fill="#e8c96d" opacity="0.8"/>
    <circle cx="1080" cy="160" r="4" fill="#7c3aed" opacity="0.9"/>
    <circle cx="750" cy="310" r="7" fill="#4f6ef7" opacity="0.8"/>
    <circle cx="820" cy="420" r="5" fill="#e8c96d" opacity="0.7"/>
    <circle cx="980" cy="400" r="9" fill="#4f6ef7" opacity="0.9"/>
    <circle cx="980" cy="400" r="16" fill="none" stroke="#4f6ef7" stroke-width="1" opacity="0.2"/>
    <circle cx="1130" cy="300" r="4" fill="#7c3aed" opacity="0.8"/>
    <circle cx="720" cy="480" r="4" fill="#e8c96d" opacity="0.6"/>
  </g>

  <!-- Large ambient glow center-right -->
  <circle cx="920" cy="310" r="220" fill="#4f6ef7" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="920" cy="310" r="120" fill="#e8c96d" opacity="0.03" filter="url(#softglow)"/>

  <!-- Gold accent divider line -->
  <rect x="80" y="440" width="480" height="1.5" fill="url(#gold)" opacity="0.7"/>

  <!-- KHYZR wordmark -->
  <text x="80" y="120" 
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
    font-size="13" 
    font-weight="600" 
    letter-spacing="6" 
    fill="#e8c96d" 
    opacity="0.85">KHYZR.COM</text>

  <!-- Main headline -->
  <text x="80" y="240" 
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
    font-size="62" 
    font-weight="700" 
    fill="#ffffff" 
    opacity="0.97"
    letter-spacing="-1">Why Most Business</text>
  <text x="80" y="316" 
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
    font-size="62" 
    font-weight="700" 
    fill="#ffffff" 
    opacity="0.97"
    letter-spacing="-1">Transformation</text>
  <text x="80" y="392" 
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
    font-size="62" 
    font-weight="700" 
    fill="#ffffff" 
    opacity="0.97"
    letter-spacing="-1">Strategies Fail</text>

  <!-- Subtitle / category pill -->
  <rect x="80" y="468" width="210" height="32" rx="16" fill="#4f6ef7" opacity="0.15"/>
  <rect x="80" y="468" width="210" height="32" rx="16" fill="none" stroke="#4f6ef7" stroke-width="1" opacity="0.4"/>
  <text x="185" y="489" 
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
    font-size="12" 
    font-weight="600" 
    fill="#818cf8" 
    text-anchor="middle"
    letter-spacing="1">EXECUTIVE STRATEGY</text>

  <!-- Tagline -->
  <text x="80" y="560" 
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
    font-size="18" 
    font-weight="400" 
    fill="#94a3b8"
    letter-spacing="0.3">Strive Forward. Thrive Together.</text>
</svg>